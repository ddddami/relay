services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        printf '%s\n' 'Relay UI: http://localhost'
        pnpm --filter web exec vite --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ./:/workspace
      - relay_pnpm_store:/workspace/.pnpm-store
      - relay_node_modules:/workspace/node_modules
      - relay_web_node_modules:/workspace/apps/web/node_modules

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        printf '%s\n' 'Relay API health: http://localhost/api/health'
        pnpm --filter api start
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ./:/workspace
      - relay_pnpm_store:/workspace/.pnpm-store
      - relay_node_modules:/workspace/node_modules
      - relay_api_node_modules:/workspace/apps/api/node_modules
      - /var/run/docker.sock:/var/run/docker.sock

  caddy:
    image: caddy:2-alpine
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  relay_api_node_modules:
  relay_node_modules:
  relay_pnpm_store:
  relay_web_node_modules:
