services:
  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter web dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/workspace

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter api dev"
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
