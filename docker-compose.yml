services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    working_dir: /workspace
    command: sh -c "pnpm --filter web dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/workspace
      - relay_pnpm_store:/workspace/.pnpm-store
      - relay_node_modules:/workspace/node_modules
      - relay_web_node_modules:/workspace/apps/web/node_modules

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    working_dir: /workspace
    command: sh -c "pnpm --filter api start"
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
      - relay_pnpm_store:/workspace/.pnpm-store
      - relay_node_modules:/workspace/node_modules
      - relay_api_node_modules:/workspace/apps/api/node_modules
      - /var/run/docker.sock:/var/run/docker.sock

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  relay_api_node_modules:
  relay_node_modules:
  relay_pnpm_store:
  relay_web_node_modules:
